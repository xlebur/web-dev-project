<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Type<span>Racer</span></div>
    <p class="auth-tagline">Test your speed. Race the world.</p>

    <div class="tab-row">
      <button class="tab" [class.active]="mode === 'login'" (click)="switchMode('login')">Sign in</button>
      <button class="tab" [class.active]="mode === 'register'" (click)="switchMode('register')">Register</button>
    </div>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <div class="field" *ngIf="mode === 'register'">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label>{{ mode === 'register' ? 'Username' : 'Username' }}</label>
      <input
        type="text"
        [(ngModel)]="username"
        [placeholder]="mode === 'register' ? 'e.g. SpeedTyper99' : 'Enter your username'"
        autocomplete="username" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••"
        autocomplete="current-password" (keydown.enter)="submit()" />
    </div>

    <button class="btn-submit" (click)="submit()" [disabled]="loading">
      {{ loading ? 'Please wait...' : (mode === 'login' ? 'Sign in' : 'Create account') }}
    </button>

    <div class="divider"><span>or</span></div>

    <button class="btn-guest" (click)="guestLogin()">
      Continue as Guest
    </button>

    <p class="auth-note">Guest progress is not saved between sessions.</p>
  </div>
</div>
