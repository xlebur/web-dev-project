<div class="lb-container">

  <div class="lb-header">
    <div>
      <h1 class="lb-title">Leaderboard</h1>
      <p class="lb-sub">Top results from all players</p>
    </div>
    <div class="lb-actions">
      <button class="btn btn-primary" (click)="playAgain()">Play Again</button>
      <button class="btn btn-danger" (click)="clearAll()" *ngIf="entries.length > 0">Clear All</button>
    </div>
  </div>

  <div class="table-wrap" *ngIf="entries.length > 0; else emptyState">
    <table class="lb-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>WPM</th>
          <th>Accuracy</th>
          <th>Errors</th>
          <th>Time</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of entries; let i = index"
            [class.gold]="i === 0" [class.silver]="i === 1" [class.bronze]="i === 2">
          <td class="rank-cell">
            <span *ngIf="isTopThree(i)" class="rank-icon">{{ getRankIcon(i) }}</span>
            <span *ngIf="!isTopThree(i)" class="rank-num">{{ i + 1 }}</span>
          </td>
          <td class="name-cell">
            <span class="player-name">{{ entry.name }}</span>
          </td>
          <td class="wpm-cell">{{ entry.wpm }}</td>
          <td>{{ entry.accuracy }}%</td>
          <td>{{ entry.errors }}</td>
          <td>{{ entry.time }}s</td>
          <td class="date-cell">{{ entry.date }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #emptyState>
    <div class="empty-state">
      <div class="empty-icon">🏁</div>
      <div class="empty-title">No races yet</div>
      <div class="empty-sub">Complete a race to appear on the leaderboard</div>
      <button class="btn btn-primary" (click)="playAgain()">Start Your First Race</button>
    </div>
  </ng-template>

</div>
